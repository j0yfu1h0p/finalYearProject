name: user
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  http: ^1.5.0
  country_picker: ^2.0.27
  otp_text_field: ^1.1.3
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  provider: ^6.1.5+1
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  flutter_typeahead: ^5.2.0
  socket_io_client: ^3.1.2
  font_awesome_flutter: ^10.10.0
  geocoding: ^3.0.0
  dio: ^5.4.0
  audioplayers: ^6.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Add custom fonts
  fonts:
    - family: UberMove
      fonts:
        - asset: assets/fonts/UberMoveMedium.otf
        - asset: assets/fonts/UberMoveBold.otf
          weight: 700

  # Add image assets
  assets:
    - assets/images/
    - assets/sounds/